{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2><i class="fas fa-users"></i> Gestão de Equipe - Cagece</h2>
    <p>Lista de funcionários com acesso ao Meta System</p>
    <hr>
    
    <table>
        <thead>
            <tr>
                <th>MATRÍCULA</th>
                <th>USUÁRIO</th>
                <th>NÍVEL DE ACESSO</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.matricula }}</td>
                <td>{{ u.username }}</td>
                <td>
                    <span class="badge" style="background: {{ '#d9534f' if u.nivel == 'admin' else '#5bc0de' }}; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px;">
                        {{ u.nivel|upper }}
                    </span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
